name: Auto-merge mobile branch

on:
  push:
    branches:
      - claude/iphone-friendly-garden-plotter-IYx8f

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge mobile branch into main
        run: |
          git fetch origin claude/iphone-friendly-garden-plotter-IYx8f
          git merge origin/claude/iphone-friendly-garden-plotter-IYx8f --no-edit -m "Auto-merge mobile branch into main"
          git push origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
